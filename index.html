<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出荷データ修正ツール</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: #dddbd3;
    --border2: #c8c5bb;
    --text: #1a1a1a;
    --text-mid: #555550;
    --text-dim: #999990;

    --logless: #6366f1;
    --logless-bg: #eef2ff;
    --logless-border: #a5b4fc;

    --cloudlogi: #059669;
    --cloudlogi-bg: #ecfdf5;
    --cloudlogi-border: #6ee7b7;

    --changed: #fef3c7;
    --changed-text: #92400e;
    --changed-border: #fcd34d;

    --ok: #16a34a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 13px; min-height: 100vh; }

  header {
    background: var(--surface); border-bottom: 2px solid var(--text);
    padding: 18px 28px; display: flex; align-items: baseline; gap: 14px;
  }
  .logo { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 600; letter-spacing: -0.02em; }
  .logo span { color: var(--logless); }
  .subtitle { color: var(--text-dim); font-size: 12px; }

  .main { padding: 24px 28px; max-width: 1800px; }

  /* システム選択 */
  .step-label {
    font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-dim); margin-bottom: 10px;
  }
  .system-select { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; max-width: 680px; }

  .sys-btn {
    background: var(--surface); border: 2px solid var(--border2); border-radius: 10px;
    padding: 16px 18px; cursor: pointer; transition: all 0.15s; text-align: left; position: relative;
  }
  .sys-btn:hover { border-color: var(--border2); background: var(--surface2); }
  .sys-btn.logless.active  { border-color: var(--logless);  background: var(--logless-bg); }
  .sys-btn.cloudlogi.active { border-color: var(--cloudlogi); background: var(--cloudlogi-bg); }
  .sys-btn .check {
    position: absolute; top: 12px; right: 14px; width: 18px; height: 18px;
    border-radius: 50%; font-size: 10px; display: flex; align-items: center; justify-content: center;
    color: #fff; opacity: 0; transition: opacity 0.15s;
  }
  .sys-btn.logless .check  { background: var(--logless); }
  .sys-btn.cloudlogi .check { background: var(--cloudlogi); }
  .sys-btn.active .check { opacity: 1; }
  .sys-name { font-size: 15px; font-weight: 700; margin-bottom: 5px; }
  .sys-btn.logless  .sys-name { color: var(--logless); }
  .sys-btn.cloudlogi .sys-name { color: var(--cloudlogi); }
  .sys-desc { font-size: 11px; color: var(--text-mid); line-height: 1.6; }

  /* 処理内容 */
  .process-panel {
    background: var(--surface); border: 1.5px solid var(--border); border-radius: 8px;
    padding: 14px 18px; margin-bottom: 16px; display: none; max-width: 680px;
  }
  .process-panel.visible { display: block; }
  .process-panel.logless  { border-color: var(--logless-border);  background: var(--logless-bg); }
  .process-panel.cloudlogi { border-color: var(--cloudlogi-border); background: var(--cloudlogi-bg); }
  .pp-title { font-size: 11px; font-weight: 700; color: var(--text-mid); margin-bottom: 8px; letter-spacing: 0.05em; }
  .pp-list { display: flex; flex-direction: column; gap: 5px; }
  .pp-item { font-size: 11px; color: var(--text-mid); display: flex; gap: 7px; align-items: flex-start; line-height: 1.5; }

  /* Upload */
  .upload-area {
    background: var(--surface); border: 2px dashed var(--border2); border-radius: 8px;
    padding: 26px; text-align: center; cursor: pointer; transition: all 0.15s;
    margin-bottom: 12px; position: relative; max-width: 680px;
  }
  .upload-area.disabled { opacity: 0.45; pointer-events: none; }
  .upload-area.logless-hover  { border-color: var(--logless);  background: var(--logless-bg); }
  .upload-area.cloudlogi-hover { border-color: var(--cloudlogi); background: var(--cloudlogi-bg); }
  .upload-area input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-text { color: var(--text-mid); font-size: 13px; }
  .upload-text strong { color: var(--text); }
  .upload-hint { font-size: 11px; color: var(--text-dim); margin-top: 5px; }

  /* エラー */
  .error-box {
    background: #fef2f2; border: 1.5px solid #fca5a5; border-radius: 8px;
    padding: 12px 16px; color: #dc2626; font-size: 12px; margin-bottom: 12px; display: none; max-width: 680px;
  }
  .error-box.visible { display: block; }

  /* 結果サマリー */
  .result-summary {
    background: var(--surface); border: 1.5px solid var(--border); border-radius: 8px;
    padding: 16px 18px; margin-bottom: 14px; display: none;
  }
  .result-summary.visible { display: flex; align-items: flex-start; gap: 20px; flex-wrap: wrap; }
  .rs-title { font-size: 13px; font-weight: 700; color: var(--ok); display: flex; align-items: center; gap: 6px; white-space: nowrap; }
  .rs-changes { display: flex; flex-direction: column; gap: 4px; flex: 1; }
  .rs-change {
    font-size: 11px; color: var(--text-mid); display: flex; align-items: center; gap: 7px;
    background: var(--surface2); border-radius: 5px; padding: 5px 10px;
  }
  .rs-change .rsc-n {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600;
    background: var(--border); border-radius: 3px; padding: 1px 6px; color: var(--text); flex-shrink: 0;
  }

  /* DL & Clear ボタン */
  .btn-row { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
  .dl-btn {
    padding: 10px 24px; border-radius: 7px; border: none;
    font-family: 'Noto Sans JP', sans-serif; font-size: 13px; font-weight: 700;
    cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 7px;
  }
  .dl-btn.logless  { background: var(--logless);  color: #fff; }
  .dl-btn.cloudlogi { background: var(--cloudlogi); color: #fff; }
  .dl-btn:hover { opacity: 0.85; }
  .clear-btn {
    background: var(--surface); border: 1.5px solid var(--border2); border-radius: 7px;
    color: var(--text-mid); font-size: 12px; font-family: 'Noto Sans JP', sans-serif;
    padding: 9px 18px; cursor: pointer; transition: all 0.15s;
  }
  .clear-btn:hover { border-color: var(--text); color: var(--text); }

  /* テーブル */
  .table-section { display: none; }
  .table-section.visible { display: block; }
  .table-label {
    font-size: 11px; font-weight: 700; color: var(--text-dim);
    letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px;
    display: flex; align-items: center; gap: 10px;
  }
  .changed-legend {
    display: flex; align-items: center; gap: 5px; font-size: 11px;
    color: var(--changed-text); background: var(--changed); border: 1px solid var(--changed-border);
    border-radius: 4px; padding: 2px 8px; font-weight: 400; letter-spacing: 0;
  }
  .table-wrap {
    overflow: auto; border: 1.5px solid var(--border); border-radius: 8px;
    background: var(--surface); max-height: calc(100vh - 300px);
  }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead th {
    background: var(--surface2); color: var(--text-mid); font-weight: 500;
    padding: 7px 10px; text-align: left; position: sticky; top: 0; z-index: 10;
    border-bottom: 1.5px solid var(--border); white-space: nowrap;
    font-size: 11px; font-family: 'JetBrains Mono', monospace;
  }
  tbody tr { border-bottom: 1px solid var(--border); }
  tbody tr:hover td { background-color: rgba(0,0,0,0.015) !important; }
  td {
    padding: 5px 10px; vertical-align: middle; white-space: nowrap;
    max-width: 320px; overflow: hidden; text-overflow: ellipsis;
  }
  td.row-n { color: var(--text-dim); font-family: 'JetBrains Mono', monospace; font-size: 10px; min-width: 36px; }
  td.cell-changed {
    background: var(--changed) !important; color: var(--changed-text); font-weight: 500;
    position: relative;
  }
  td.cell-new-col { background: #f0fdf4 !important; color: #166534; font-weight: 500; }

  .empty-hint { text-align: center; padding: 32px 0 0; color: var(--text-dim); font-size: 12px; }
</style>
</head>
<body>

<header>
  <div class="logo">shipping<span>.</span>fix</div>
  <div class="subtitle">出荷データ修正ツール — ロジレス / クラウドロジ</div>
</header>

<div class="main">

  <!-- STEP 1 -->
  <div class="step-label">Step 1 — ロジシステムを選択</div>
  <div class="system-select">
    <button class="sys-btn logless" onclick="selectSystem('logless')">
      <div class="check">✓</div>
      <div class="sys-name">📦 ロジレス</div>
      <div class="sys-desc">改行削除・空欄を0に変換<br>割引合計を計算して上書き</div>
    </button>
    <button class="sys-btn cloudlogi" onclick="selectSystem('cloudlogi')">
      <div class="check">✓</div>
      <div class="sys-name">🚚 クラウドロジ</div>
      <div class="sys-desc">改行削除・不要列を削除<br>割引合計列を新規追加</div>
    </button>
  </div>

  <div class="process-panel" id="processPanel">
    <div class="pp-title">実行される処理</div>
    <div class="pp-list" id="processList"></div>
  </div>

  <!-- STEP 2 -->
  <div class="step-label">Step 2 — CSVファイルをアップロード</div>
  <div class="upload-area disabled" id="dropZone">
    <input type="file" id="fileInput" accept=".csv" disabled>
    <div class="upload-text">📂 &nbsp;<strong>CSVファイルをドロップ</strong>、またはクリックして選択</div>
    <div class="upload-hint">UTF-8 / Shift-JIS 対応　・　元のファイルは変更されません</div>
  </div>

  <div class="error-box" id="errorBox"></div>

  <!-- 結果サマリー -->
  <div class="result-summary" id="resultSummary">
    <div class="rs-title">✅ 修正完了</div>
    <div class="rs-changes" id="resultChanges"></div>
  </div>

  <!-- ボタン行 -->
  <div class="btn-row" id="btnRow" style="display:none">
    <button class="dl-btn" id="dlBtn" onclick="downloadResult()">⬇ 修正済みCSVをダウンロード</button>
    <button class="clear-btn" onclick="clearAll()">🗑 クリア</button>
  </div>

  <!-- テーブル -->
  <div class="table-section" id="tableSection">
    <div class="table-label">
      修正後のデータプレビュー
      <span class="changed-legend">■ 変更されたセル</span>
    </div>
    <div class="table-wrap">
      <table><thead id="thead"></thead><tbody id="tbody"></tbody></table>
    </div>
  </div>

  <div class="empty-hint" id="emptyHint">システムを選択してからCSVをアップロードしてください</div>

</div>

<script>
let selectedSystem = null;
let resultCSV = null;

// ===== システム選択 =====
function selectSystem(sys) {
  selectedSystem = sys;
  document.querySelectorAll('.sys-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.sys-btn.' + sys).classList.add('active');

  const dz = document.getElementById('dropZone');
  dz.classList.remove('disabled', 'logless-hover', 'cloudlogi-hover');
  document.getElementById('fileInput').disabled = false;

  const panel = document.getElementById('processPanel');
  panel.className = 'process-panel visible ' + sys;
  document.getElementById('processList').innerHTML = getProcessItems(sys);

  const dlBtn = document.getElementById('dlBtn');
  dlBtn.className = 'dl-btn ' + sys;

  clearResult();
}

function getProcessItems(sys) {
  const i = (icon, text) => `<div class="pp-item"><span>${icon}</span><span>${text}</span></div>`;
  if (sys === 'logless') return [
    i('🧹', '26列目（shipping_memo）のセル内改行を削除'),
    i('🧹', '39列目（management_memo）のセル内改行を削除'),
    i('0️⃣', '41列目（order_point_add）の空欄を 0 に変換'),
    i('±',  '54列目（order_point_use）のマイナス値を絶対値に変換'),
    i('Σ',  '51〜56列目の合計 → 57列目（extend_status_date47）に上書き'),
  ].join('');
  return [
    i('🧹', '30列目（extend_status24）のセル内改行を削除'),
    i('🧹', '31列目（management_memo）のセル内改行を削除'),
    i('🗑', '40列目（invoice_bundle_flg）を列ごと削除'),
    i('±',  '57列目（member_rank_discount_price）のマイナス値を絶対値に変換'),
    i('Σ',  '53〜58列目の合計 → 末尾に「割引合計」列を新規追加'),
  ].join('');
}

// ===== CSV パース =====
function parseCSV(text) {
  text = text.replace(/^\uFEFF/, '');
  const rows = [];
  let cur = '', inQ = false;

  const flushRow = () => {
    if (!cur.trim()) return;
    const row = [], cells = cur;
    let c = '', q = false;
    for (let i = 0; i < cells.length; i++) {
      const ch = cells[i];
      if (ch === '"') { if (q && cells[i+1]==='"') { c+='"'; i++; } else q=!q; }
      else if (ch === ',' && !q) { row.push(c); c=''; }
      else c += ch;
    }
    row.push(c);
    rows.push(row);
    cur = '';
  };

  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '"') { inQ = !inQ; cur += ch; }
    else if ((ch === '\n' || ch === '\r') && !inQ) {
      if (ch === '\r' && text[i+1] === '\n') i++;
      flushRow();
    } else cur += ch;
  }
  flushRow();
  return rows;
}

// ===== 処理：ロジレス =====
function processLogless(rows) {
  const changes = [];
  // deep copy
  let r = rows.map(row => [...row]);

  // ① 改行削除（idx 25, 38）
  let nlCount = 0;
  r = r.map((row, ri) => {
    if (ri === 0) return row;
    const nr = [...row];
    [25, 38].forEach(ci => {
      if (nr[ci] !== undefined && /[\r\n]/.test(nr[ci])) {
        nr[ci] = nr[ci].replace(/[\r\n]+/g, ' ').trim();
        nlCount++;
      }
    });
    return nr;
  });
  changes.push({ label: 'セル内改行を削除（shipping_memo / management_memo）', count: nlCount });

  // ② 空欄を0（idx 40）
  let zeroCount = 0;
  r = r.map((row, ri) => {
    if (ri === 0) return row;
    const nr = [...row];
    if (nr[40] === undefined || nr[40].trim() === '') { nr[40] = '0'; zeroCount++; }
    return nr;
  });
  changes.push({ label: '空欄を 0 に変換（order_point_add）', count: zeroCount });

  // ③ 絶対値（idx 53）
  let absCount = 0;
  r = r.map((row, ri) => {
    if (ri === 0) return row;
    const nr = [...row];
    const v = parseFloat(nr[53]);
    if (!isNaN(v) && v < 0) { nr[53] = Math.abs(v).toString(); absCount++; }
    return nr;
  });
  changes.push({ label: 'マイナス値を絶対値に変換（order_point_use）', count: absCount });

  // ④ 合計（idx50〜55 → idx56）
  let sumCount = 0;
  r = r.map((row, ri) => {
    if (ri === 0) return row;
    const nr = [...row];
    let sum = 0;
    for (let j = 50; j <= 55; j++) { const v = parseFloat(nr[j]); if (!isNaN(v)) sum += v; }
    nr[56] = sum.toString();
    sumCount++;
    return nr;
  });
  changes.push({ label: '割引合計を計算して上書き（extend_status_date47）', count: sumCount });

  return { rows: r, changes };
}

// ===== 処理：クラウドロジ =====
function processCloudlogi(rows) {
  const changes = [];
  let r = rows.map(row => [...row]);

  // ① 改行削除（idx 29, 30）
  let nlCount = 0;
  r = r.map((row, ri) => {
    if (ri === 0) return row;
    const nr = [...row];
    [29, 30].forEach(ci => {
      if (nr[ci] !== undefined && /[\r\n]/.test(nr[ci])) {
        nr[ci] = nr[ci].replace(/[\r\n]+/g, ' ').trim();
        nlCount++;
      }
    });
    return nr;
  });
  changes.push({ label: 'セル内改行を削除（extend_status24 / management_memo）', count: nlCount });

  // ② 40列目（idx39）削除
  r = r.map(row => { const nr = [...row]; nr.splice(39, 1); return nr; });
  changes.push({ label: 'invoice_bundle_flg 列を削除（40列目）', count: r.length - 1 });

  // ③ 絶対値（列削除後 → 元57列目 = idx55）
  let absCount = 0;
  r = r.map((row, ri) => {
    if (ri === 0) return row;
    const nr = [...row];
    const v = parseFloat(nr[55]);
    if (!isNaN(v) && v < 0) { nr[55] = Math.abs(v).toString(); absCount++; }
    return nr;
  });
  changes.push({ label: 'マイナス値を絶対値に変換（member_rank_discount_price）', count: absCount });

  // ④ 合計（列削除後 idx51〜56）→ 末尾に追加
  r[0] = [...r[0], '割引合計'];
  let sumCount = 0;
  r = r.map((row, ri) => {
    if (ri === 0) return row;
    const nr = [...row];
    let sum = 0;
    for (let j = 51; j <= 56; j++) { const v = parseFloat(nr[j]); if (!isNaN(v)) sum += v; }
    nr.push(sum.toString());
    sumCount++;
    return nr;
  });
  changes.push({ label: '割引合計を計算して新規列に追加', count: sumCount });

  return { rows: r, changes };
}

// ===== 変更セルを検出 =====
function diffRows(before, after) {
  // after行ごとに「変更されたcolIdxのSet」を返す
  return after.map((row, ri) => {
    const changed = new Set();
    if (ri === 0) {
      // ヘッダー：列が増えたら新規列としてマーク
      row.forEach((_, ci) => { if (before[0] === undefined || before[0][ci] === undefined) changed.add(ci); });
      return changed;
    }
    const bRow = before[ri];
    if (!bRow) return changed;
    row.forEach((cell, ci) => {
      const bCell = bRow[ci] !== undefined ? bRow[ci] : '';
      if (cell !== bCell) changed.add(ci);
      if (bRow[ci] === undefined) changed.add(ci); // 新規列
    });
    return changed;
  });
}

// ===== テーブル描画 =====
function renderTable(rows, diffs, isCloudlogi) {
  const headers = rows[0];
  const newColStart = isCloudlogi ? rows[0].length - 1 : -1;

  document.getElementById('thead').innerHTML = `<tr>
    <th>#</th>
    ${headers.map((h, ci) => {
      const isNew = isCloudlogi && ci >= newColStart;
      return `<th style="${isNew ? 'color:#166534;background:#f0fdf4' : ''}">${esc(h)}</th>`;
    }).join('')}
  </tr>`;

  const SHORT = new Set(['order_id','variation_id','user_id','fixed_purchase_id']);
  let html = '';
  const MAX_ROWS = 500;
  for (let ri = 1; ri < Math.min(rows.length, MAX_ROWS + 1); ri++) {
    const row = rows[ri];
    const changed = diffs[ri] || new Set();
    const cells = row.map((cell, ci) => {
      const isNew = isCloudlogi && ci >= newColStart;
      const isChanged = changed.has(ci);
      let cls = '';
      if (isNew) cls = 'cell-new-col';
      else if (isChanged) cls = 'cell-changed';
      const sc = (headers[ci] && SHORT.has(headers[ci])) ? ' style="max-width:100px"' : '';
      return `<td class="${cls}"${sc}>${esc(cell)}</td>`;
    }).join('');
    html += `<tr><td class="row-n">${ri + 1}</td>${cells}</tr>`;
  }
  if (rows.length - 1 > MAX_ROWS) {
    html += `<tr><td colspan="${headers.length + 1}" style="text-align:center;color:var(--text-dim);padding:12px;font-size:11px">... 残り ${rows.length - 1 - MAX_ROWS} 行は省略（ダウンロードで全件確認できます）</td></tr>`;
  }
  document.getElementById('tbody').innerHTML = html;
}

// ===== CSV書き出し =====
function toCSVString(rows) {
  return '\uFEFF' + rows.map(row =>
    row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')
  ).join('\r\n');
}

// ===== ファイル処理 =====
function handleFile(file) {
  if (!selectedSystem) { showError('先にシステムを選択してください。'); return; }
  clearResult();

  const tryRead = enc => new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => res(e.target.result); r.onerror = rej;
    r.readAsText(file, enc);
  });

  tryRead('UTF-8').then(text => /\ufffd/.test(text) ? tryRead('Shift-JIS') : text)
    .then(text => {
      const original = parseCSV(text);
      if (!original || original.length < 2) { showError('CSVの解析に失敗しました。'); return; }

      let result;
      try {
        result = selectedSystem === 'logless' ? processLogless(original) : processCloudlogi(original);
      } catch(e) { showError('処理中にエラーが発生しました：' + e.message); return; }

      resultCSV = toCSVString(result.rows);

      // 変更セット計算
      const diffs = diffRows(original, result.rows);

      // サマリー
      const summary = document.getElementById('resultSummary');
      summary.className = 'result-summary visible';
      document.getElementById('resultChanges').innerHTML = result.changes.map(c =>
        `<div class="rs-change"><span class="rsc-n">${c.count}件</span><span>${c.label}</span></div>`
      ).join('');

      // ボタン
      const btnRow = document.getElementById('btnRow');
      btnRow.style.display = 'flex';
      document.getElementById('dlBtn').dataset.filename = file.name.replace(/\.csv$/i, '') + '_修正済.csv';

      // テーブル
      renderTable(result.rows, diffs, selectedSystem === 'cloudlogi');
      document.getElementById('tableSection').className = 'table-section visible';
      document.getElementById('emptyHint').style.display = 'none';
    })
    .catch(() => showError('ファイルの読み込みに失敗しました。'));
}

function showError(msg) {
  const el = document.getElementById('errorBox');
  el.textContent = '⚠ ' + msg; el.classList.add('visible');
}

function clearResult() {
  resultCSV = null;
  document.getElementById('resultSummary').classList.remove('visible');
  document.getElementById('btnRow').style.display = 'none';
  document.getElementById('tableSection').classList.remove('visible');
  document.getElementById('errorBox').classList.remove('visible');
  document.getElementById('emptyHint').style.display = 'none';
}

function clearAll() {
  selectedSystem = null; resultCSV = null;
  document.querySelectorAll('.sys-btn').forEach(b => b.classList.remove('active'));
  const dz = document.getElementById('dropZone');
  dz.className = 'upload-area disabled';
  document.getElementById('fileInput').disabled = true;
  document.getElementById('fileInput').value = '';
  document.getElementById('processPanel').classList.remove('visible');
  clearResult();
  document.getElementById('emptyHint').style.display = 'block';
}

function downloadResult() {
  if (!resultCSV) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([resultCSV], { type: 'text/csv;charset=utf-8;' }));
  a.download = document.getElementById('dlBtn').dataset.filename || '修正済み.csv';
  a.click();
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== イベント =====
document.getElementById('fileInput').addEventListener('change', e => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});
const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => {
  e.preventDefault();
  if (!dz.classList.contains('disabled')) dz.classList.add(selectedSystem + '-hover');
});
dz.addEventListener('dragleave', () => dz.classList.remove('logless-hover','cloudlogi-hover'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('logless-hover','cloudlogi-hover');
  if (!dz.classList.contains('disabled') && e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
</script>
</body>
</html>
